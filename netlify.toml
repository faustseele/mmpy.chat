# Global settings applied to the whole site.
#
# “base” is the directory to change to before starting build. If you set base:
#        that is where we will look for package.json/.nvmrc/etc, not repo root!
# “command” is your build command.
# “publish” is the directory to publish (relative to the root of your repo).

[build]
  publish = "dist"

# ── Security headers (all routes) ──────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https://ya-praktikum.tech data:; connect-src 'self' https://ya-praktikum.tech wss://ya-praktikum.tech; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

# ── Cache control ──────────────────────────────────────────

# index.html must never be cached by the browser — each Netlify deploy
# generates new content-hashed asset filenames, and a stale cached
# index.html will reference old hashes that no longer exist, causing
# the /*→/index.html rewrite to silently serve HTML where the browser
# expects JS modules, resulting in requests that hang indefinitely.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# SW registration file must also stay fresh so the service worker
# always reflects the current asset manifest after each deploy.
[[headers]]
  for = "/registerSW.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Hashed assets are content-addressed — safe to cache forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# The `from = "/*"` redirect tells Netlify to redirect
# all pages to the `to = "index.html"` file. Basically, this
# is a 'rewrite' rule, not a 'redirect' one.
# Le `status = 200` is deceiving Netlify into thinking
# that it's a redirect, but it's a rewrite.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
 